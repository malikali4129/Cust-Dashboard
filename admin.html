<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b0f19">
    <link rel="manifest" href="manifest.webmanifest">
    <title>Admin Panel - University Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">
    <noscript>
        <div class="noscript-fallback">
            <h2>JavaScript Required</h2>
            <p>The Admin Panel requires JavaScript to manage content and connect to Supabase. Please enable JavaScript in your browser settings to continue.</p>
        </div>
    </noscript>

    <section id="login-screen" class="login-shell">
        <div class="login-card">
            <p class="eyebrow">Secure Access</p>
            <h1>Admin access</h1>
            <p class="login-copy">Sign in to manage the board.</p>
            <form class="editor-form" onsubmit="handleLogin(event)">
                <label class="field">
                    <span>Email</span>
                    <input class="form-input" id="login-email" type="email" autocomplete="username" required>
                </label>
                <label class="field">
                    <span>Password</span>
                    <input class="form-input" id="login-password" type="password" autocomplete="current-password" required>
                </label>
                <button class="btn btn-primary" type="submit">Sign in</button>
            </form>
            <div class="login-footer">
                <div class="status-pill compact">
                    <strong data-connection-state>Online</strong>
                    <span data-connection-hint>Synced</span>
                </div>
                <a href="index.html">Back to dashboard</a>
            </div>
        </div>
    </section>

    <div id="admin-dashboard" class="app-shell hidden">
        <main class="main-content admin-main">
            <header class="admin-header">
                <div class="admin-header-left">
                    <h1>Admin Panel</h1>
                    <span class="connection-dot" id="admin-connection-dot" title="Connection status"></span>
                </div>
                <div class="admin-header-actions">
                    <button class="theme-toggle-btn" type="button" onclick="DashboardUtils.toggleTheme()" title="Toggle theme">
                        <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>
                    <a class="btn btn-secondary btn-sm" href="index.html">Student view</a>
                    <button class="btn btn-danger btn-sm" type="button" onclick="handleLogout()">Log out</button>
                    <button class="btn btn-primary btn-sm" type="button" onclick="openAddModal()">Add</button>
                </div>
            </header>

            <div class="tabs">
                <button class="tab active" data-tab="announcements" onclick="switchTab('announcements')">Announcements</button>
                <button class="tab" data-tab="assignments" onclick="switchTab('assignments')">Assignments</button>
                <button class="tab" data-tab="deadlines" onclick="switchTab('deadlines')">Deadlines</button>
                <button class="tab" data-tab="quizzes" onclick="switchTab('quizzes')">Quizzes</button>
                <button class="tab" data-tab="settings" onclick="switchTab('settings')">Settings</button>
            </div>

            <div id="tab-content"></div>
        </main>
    </div>

    <div id="item-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Record</h3>
                <button class="modal-close" type="button" onclick="DashboardUtils.closeModal('item-modal')">Close</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" type="button" onclick="DashboardUtils.closeModal('item-modal')">Cancel</button>
                <button class="btn btn-primary" type="button" onclick="saveItem()">Save</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
    <script src="admin.js"></script>
</body>
</html>
