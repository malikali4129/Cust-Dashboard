<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b0f19">
    <link rel="manifest" href="manifest.webmanifest">
    <title>University Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <noscript>
        <div class="noscript-fallback">
            <h2>JavaScript Required</h2>
            <p>The University Dashboard requires JavaScript to display live data from Supabase. Please enable JavaScript in your browser settings to continue.</p>
        </div>
    </noscript>

    <div class="app-shell">
        <button class="mobile-toggle" aria-label="Open navigation">Menu</button>
        <aside class="sidebar">
            <div class="sidebar-brand">
                <p class="eyebrow">Student Portal</p>
                <h1>University Dashboard</h1>
                <p class="sidebar-copy">Live class updates in one place.</p>
            </div>
            <nav class="sidebar-nav">
                <a href="#overview" class="nav-item active">Overview</a>
                <a href="#announcements" class="nav-item">Announcements</a>
                <a href="#assignments" class="nav-item">Assignments</a>
                <a href="#deadlines" class="nav-item">Deadlines</a>
                <a href="#quizzes" class="nav-item">Quizzes</a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-secondary" type="button" onclick="DashboardUtils.toggleTheme()">
                    Theme <span data-theme-toggle-label>Dark</span>
                </button>
                <button class="feedback-button" type="button" onclick="openFeedbackModal()">
                    Send feedback
                </button>
            </div>

        </aside>

        <main class="main-content">
            <header class="dashboard-header compact-header">
                <div class="brand-lockup">
                    <h2>My Cust</h2>
                </div>
                <div class="dashboard-header-meta">
                    <div class="server-chip">
                        <span class="server-dot" id="server-dot"></span>
                        <span data-connection-state>Online</span>
                    </div>
                    <a href="admin.html" class="header-meta-item" title="Admin panel">
                        <span class="meta-label">Last update</span>
                        <strong id="last-updated">Sync pending</strong>
                    </a>

            </header>

            <section class="count-bar" id="stats-grid"></section>

            <div class="dashboard-grid">
                <section id="announcements" class="panel dashboard-section section-wide">
                    <div class="section-heading">
                        <h2>Announcements</h2>
                    </div>
                    <div id="announcements-list"></div>
                </section>

                <section id="assignments" class="panel dashboard-section">
                    <div class="section-heading">
                        <p class="eyebrow">Assignments</p>
                        <h2>Assignments</h2>
                    </div>
                    <div id="assignments-list"></div>
                </section>

                <section id="deadlines" class="panel dashboard-section">
                    <div class="section-heading">
                        <p class="eyebrow">Deadlines</p>
                        <h2>Deadlines</h2>
                    </div>
                    <div id="deadlines-list"></div>
                </section>

                <section id="quizzes" class="panel dashboard-section">
                    <div class="section-heading">
                        <p class="eyebrow">Quizzes</p>
                        <h2>Quizzes</h2>
                    </div>
                    <div id="quizzes-list"></div>
                </section>
            </div>
        </main>
    </div>

    <div id="detail-modal" class="modal-overlay">
        <div class="modal detail-modal">
            <div class="modal-header">
                <h3 id="detail-modal-title">Details</h3>
                <button class="modal-close" type="button" onclick="DashboardUtils.closeModal('detail-modal')">Close</button>
            </div>
            <div id="detail-modal-body" class="modal-body"></div>
        </div>
    </div>

    <div id="feedback-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Send Feedback</h3>
                <button class="modal-close" type="button" onclick="DashboardUtils.closeModal('feedback-modal')">Close</button>
            </div>
            <div class="modal-body">
                <form id="feedback-form" class="feedback-form">
                    <label class="field">
                        <span>Name</span>
                        <input class="form-input" name="name" maxlength="100" required>
                    </label>
                    <label class="field">
                        <span>Suggestion</span>
                        <textarea class="form-textarea" name="suggestion" minlength="5" maxlength="1000" required></textarea>
                    </label>
                    <div class="star-rating-input">
                        <span>Rating</span>
                        <div class="star-rating" id="feedback-stars">
                            <span class="star" data-value="1">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="5">★</span>
                        </div>
                        <input type="hidden" name="rating" id="feedback-rating" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" type="button" onclick="DashboardUtils.closeModal('feedback-modal')">Cancel</button>
                <button class="btn btn-primary" type="button" onclick="submitFeedback()">Submit</button>
            </div>
        </div>
    </div>


    <script src="config.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
