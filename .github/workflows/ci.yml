name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify static site files
        run: |
          test -f index.html
          test -f admin.html
          test -f README.md
          test -f schema.sql
          test -f manifest.webmanifest
          test -f sw.js
          test -f config.js
          test -f data.js
          test -f dashboard.js
          test -f admin.js
          grep -q 'config.js' index.html
          grep -q 'data-offline.js' index.html
          grep -q 'data.js' index.html
          grep -q 'script.js' index.html
          grep -q 'dashboard.js' index.html
          grep -q 'config.js' admin.html
          grep -q 'data-offline.js' admin.html
          grep -q 'data.js' admin.html
          grep -q 'script.js' admin.html
          grep -q 'admin.js' admin.html
