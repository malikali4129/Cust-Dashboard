name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify static site files
        run: |
          test -f index.html
          test -f admin.html
          test -f README.md
          test -f schema.sql
          test -f manifest.webmanifest
          test -f sw.js
          test -f config.js
          test -f data.js
          test -f script.js
          test -f dashboard.js
          test -f admin.js
          test -f data-offline.js
          echo "All required files present."
