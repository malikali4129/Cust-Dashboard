name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify JavaScript syntax
        run: |
          node --check config.js
          node --check data-offline.js
          node --check data.js
          node --check script.js
          node --check dashboard.js
          node --check admin.js
          node --check server.js

      - name: Verify project files
        run: |
          test -f index.html
          test -f admin.html
          test -f schema.sql
          test -f manifest.webmanifest
          test -f sw.js
