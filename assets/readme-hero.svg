<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">My Cust Dashboard hero banner</title>
  <desc id="desc">Animated dark banner with glowing dashboard cards and a live status pulse.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060816" />
      <stop offset="55%" stop-color="#0b1020" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="50%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)" />
  <circle cx="170" cy="70" r="90" fill="#2563eb" opacity="0.16">
    <animate attributeName="opacity" values="0.12;0.24;0.12" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="1030" cy="250" r="120" fill="#f97316" opacity="0.10">
    <animate attributeName="r" values="110;135;110" dur="6s" repeatCount="indefinite" />
  </circle>

  <g filter="url(#shadow)">
    <rect x="70" y="56" width="1060" height="208" rx="28" fill="#08101e" stroke="#1f2937" />
    <rect x="92" y="78" width="285" height="164" rx="22" fill="url(#panel)" stroke="#243041" />
    <rect x="402" y="78" width="312" height="164" rx="22" fill="url(#panel)" stroke="#243041" />
    <rect x="738" y="78" width="370" height="164" rx="22" fill="url(#panel)" stroke="#243041" />

    <rect x="114" y="102" width="120" height="14" rx="7" fill="#cbd5e1" opacity="0.92" />
    <rect x="114" y="130" width="210" height="10" rx="5" fill="#334155" />
    <rect x="114" y="150" width="176" height="10" rx="5" fill="#334155" />
    <rect x="114" y="170" width="196" height="10" rx="5" fill="#334155" />

    <rect x="440" y="102" width="150" height="14" rx="7" fill="#e2e8f0" opacity="0.95" />
    <rect x="440" y="138" width="230" height="54" rx="16" fill="#0b1220" stroke="#1f2937" />
    <rect x="462" y="155" width="92" height="12" rx="6" fill="#22c55e" opacity="0.95">
      <animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" repeatCount="indefinite" />
    </rect>
    <rect x="440" y="206" width="178" height="10" rx="5" fill="#334155" />

    <rect x="778" y="104" width="180" height="14" rx="7" fill="#e2e8f0" opacity="0.95" />
    <rect x="778" y="136" width="284" height="16" rx="8" fill="#0b1220" />
    <rect x="778" y="166" width="250" height="16" rx="8" fill="#0b1220" />
    <rect x="778" y="196" width="210" height="16" rx="8" fill="#0b1220" />

    <rect x="1008" y="102" width="72" height="30" rx="15" fill="#111827" stroke="#334155" />
    <rect x="1018" y="111" width="10" height="10" rx="5" fill="#22c55e">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite" />
    </rect>
    <text x="1036" y="120" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">LIVE</text>
  </g>

  <rect x="70" y="278" width="1060" height="8" rx="4" fill="url(#glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite" />
  </rect>

  <text x="110" y="184" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">My Cust Dashboard</text>
  <text x="110" y="216" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="15">Supabase-backed class updates with offline shell support</text>
</svg>
