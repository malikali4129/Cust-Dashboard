<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">My Cust Dashboard preview</title>
  <desc id="desc">Two-panel stylized preview of the student dashboard and admin panel.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10182a" />
      <stop offset="100%" stop-color="#0b1220" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="url(#page)" />
  <rect x="60" y="56" width="1080" height="648" rx="34" fill="#070d1a" stroke="#1f2937" filter="url(#shadow)" />
  <rect x="92" y="92" width="1016" height="76" rx="22" fill="#0d1426" stroke="#243041" />
  <rect x="122" y="116" width="150" height="18" rx="9" fill="#e2e8f0" />
  <circle cx="1030" cy="130" r="8" fill="#22c55e">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <rect x="1050" y="122" width="36" height="16" rx="8" fill="#334155" />

  <rect x="92" y="194" width="620" height="486" rx="28" fill="url(#card)" stroke="#243041" />
  <rect x="742" y="194" width="366" height="486" rx="28" fill="url(#card)" stroke="#243041" />

  <text x="126" y="236" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Student Dashboard</text>
  <text x="126" y="262" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="14">Announcements, assignments, deadlines, quizzes</text>

  <rect x="126" y="290" width="124" height="84" rx="20" fill="#0b1220" stroke="#1f2937" />
  <rect x="262" y="290" width="124" height="84" rx="20" fill="#0b1220" stroke="#1f2937" />
  <rect x="398" y="290" width="124" height="84" rx="20" fill="#0b1220" stroke="#1f2937" />
  <rect x="534" y="290" width="124" height="84" rx="20" fill="#0b1220" stroke="#1f2937" />
  <text x="148" y="330" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">12</text>
  <text x="148" y="354" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="12">Announcements</text>
  <text x="284" y="330" fill="#dcfce7" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">5</text>
  <text x="284" y="354" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="12">Pending</text>
  <text x="420" y="330" fill="#fecaca" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">3</text>
  <text x="420" y="354" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="12">Deadlines</text>
  <text x="556" y="330" fill="#e9d5ff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">2</text>
  <text x="556" y="354" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="12">Quizzes</text>

  <rect x="126" y="402" width="548" height="96" rx="22" fill="#0b1220" stroke="#243041" />
  <rect x="126" y="512" width="548" height="96" rx="22" fill="#0b1220" stroke="#243041" />
  <rect x="126" y="622" width="548" height="34" rx="17" fill="url(#accent)" opacity="0.95">
    <animate attributeName="opacity" values="0.75;1;0.75" dur="3s" repeatCount="indefinite" />
  </rect>
  <text x="150" y="441" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">High Priority Announcement</text>
  <text x="150" y="468" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="13">Class shifted to Friday due to exam scheduling.</text>
  <text x="150" y="551" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Assignment Due Soon</text>
  <text x="150" y="578" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="13">Submit the project brief before 9 PM tonight.</text>

  <text x="778" y="236" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Admin Panel</text>
  <text x="778" y="262" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="14">CRUD, logs, import/export, and feedback review</text>
  <rect x="778" y="294" width="290" height="44" rx="16" fill="#0b1220" stroke="#243041" />
  <rect x="794" y="308" width="80" height="14" rx="7" fill="#dbeafe" />
  <rect x="888" y="308" width="100" height="14" rx="7" fill="#334155" />
  <rect x="1004" y="308" width="44" height="14" rx="7" fill="#22c55e" />
  <rect x="778" y="356" width="290" height="50" rx="16" fill="#0b1220" stroke="#243041" />
  <rect x="778" y="420" width="290" height="50" rx="16" fill="#0b1220" stroke="#243041" />
  <rect x="778" y="484" width="290" height="50" rx="16" fill="#0b1220" stroke="#243041" />
  <rect x="778" y="548" width="290" height="50" rx="16" fill="#0b1220" stroke="#243041" />
  <rect x="778" y="612" width="130" height="34" rx="17" fill="#38bdf8" opacity="0.9" />
  <rect x="928" y="612" width="140" height="34" rx="17" fill="#22c55e" opacity="0.9" />

  <text x="800" y="387" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Announcements</text>
  <text x="800" y="451" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Assignments</text>
  <text x="800" y="515" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Deadlines</text>
  <text x="800" y="579" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Quizzes</text>
  <text x="806" y="633" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Export</text>
  <text x="958" y="633" fill="#06101b" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Import</text>
</svg>
